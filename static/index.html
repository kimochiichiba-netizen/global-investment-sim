<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌍 グローバル投資シミュレーター</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { background: #060d1a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    .card  { background: #0f1e35; border: 1px solid #1e3a5f; border-radius: 14px; }
    .card2 { background: #111827; border: 1px solid #1f2937; border-radius: 14px; }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }

    /* 市場バッジ */
    .mkt-open   { background:#052e16; border:1px solid #16a34a; color:#4ade80; }
    .mkt-closed { background:#1a1a2e; border:1px solid #334155; color:#64748b; }

    /* ボタン */
    .btn-run {
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      color:#fff; border:none; border-radius:10px;
      padding:10px 22px; cursor:pointer; font-weight:700;
      transition:opacity .2s;
    }
    .btn-run:hover { opacity:.85; }
    .btn-run:disabled { opacity:.45; cursor:not-allowed; }
    .btn-reset {
      background:#ef444415; color:#ef4444;
      border:1px solid #ef4444; border-radius:10px;
      padding:10px 18px; cursor:pointer; font-weight:600;
    }
    .btn-reset:hover { background:#ef444430; }

    /* タブ */
    .tab { padding:5px 12px; border-radius:6px; font-size:12px; cursor:pointer;
           border:1px solid #1e3a5f; color:#64748b; background:transparent; }
    .tab.active { background:#6366f1; color:#fff; border-color:#6366f1; }

    /* バッジ */
    .badge-buy  { background:#16a34a20; color:#22c55e; border:1px solid #16a34a; }
    .badge-sell { background:#dc262620; color:#ef4444; border:1px solid #dc2626; }

    /* スピナー */
    .spin { width:16px; height:16px; border:3px solid #ffffff30;
            border-top-color:#fff; border-radius:50%;
            animation:spin .7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* グロー効果 */
    .glow-green { box-shadow: 0 0 20px #22c55e30; }
    .glow-blue  { box-shadow: 0 0 20px #6366f130; }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:#0f1e35; }
    ::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:3px; }
  </style>
</head>
<body class="min-h-screen p-5">

<!-- ヘッダー -->
<div class="flex items-center justify-between mb-6">
  <div class="flex items-center gap-3">
    <span class="text-4xl">🌍</span>
    <div>
      <h1 class="text-2xl font-bold text-white">グローバル投資シミュレーター</h1>
      <p class="text-xs text-slate-500">5市場・15銘柄 / 仮想資金200万円 / 24時間自動売買</p>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <div id="countdown-badge" class="text-xs text-slate-500 bg-slate-900 px-3 py-1.5 rounded-full border border-slate-700">
      更新: --秒
    </div>
    <button id="run-btn" class="btn-run" onclick="runTrade()">⚡ 今すぐ取引</button>
    <button class="btn-reset" onclick="resetData()">🔄 リセット</button>
  </div>
</div>

<!-- 市場ステータス -->
<div id="market-cards" class="grid grid-cols-5 gap-3 mb-6">
  <!-- JSで生成 -->
</div>

<!-- サマリーカード -->
<div class="grid grid-cols-4 gap-4 mb-5">
  <div class="card p-5 glow-blue">
    <div class="text-xs text-slate-400 mb-1">総資産（円換算）</div>
    <div id="total-assets" class="text-2xl font-bold text-white">--</div>
    <div id="total-assets-sub" class="text-xs text-slate-500 mt-1">初期: 200万円</div>
  </div>
  <div class="card p-5">
    <div class="text-xs text-slate-400 mb-1">現金残高</div>
    <div id="cash" class="text-2xl font-bold text-white">--</div>
    <div id="cash-ratio" class="text-xs text-slate-500 mt-1">--</div>
  </div>
  <div class="card p-5">
    <div class="text-xs text-slate-400 mb-1">損益額</div>
    <div id="pnl" class="text-2xl font-bold">--</div>
    <div class="text-xs text-slate-400 mt-1">初期比</div>
  </div>
  <div class="card p-5">
    <div class="text-xs text-slate-400 mb-1">損益率</div>
    <div id="pnl-pct" class="text-2xl font-bold">--</div>
    <div class="text-xs text-slate-500 mt-1">スタートから</div>
  </div>
</div>

<!-- ポートフォリオ + チャート -->
<div class="grid grid-cols-2 gap-4 mb-4">

  <!-- ポートフォリオ -->
  <div class="card p-5">
    <div class="flex justify-between items-center mb-3">
      <h2 class="font-bold text-white">💼 保有ポートフォリオ</h2>
      <span id="stock-value" class="text-sm text-slate-400">--</span>
    </div>
    <div id="portfolio-table" class="overflow-auto max-h-72">
      <div class="text-slate-500 text-sm text-center py-10">読み込み中...</div>
    </div>
  </div>

  <!-- チャート -->
  <div class="card p-5">
    <div class="flex justify-between items-center mb-2">
      <h2 class="font-bold text-white">📈 株価チャート（30日）</h2>
    </div>
    <div id="ticker-tabs" class="flex flex-wrap gap-1.5 mb-3"></div>
    <div class="relative h-52">
      <canvas id="price-chart"></canvas>
      <div id="chart-loading" class="absolute inset-0 flex items-center justify-center text-slate-500 text-sm">
        銘柄を選択してください
      </div>
    </div>
    <div id="chart-info" class="mt-2 text-xs text-slate-400 flex gap-4 hidden">
      <span id="info-currency" class="text-slate-300 font-medium"></span>
      <span>現在値: <span id="info-price" class="text-white font-medium"></span></span>
      <span>MA5: <span id="info-ma5" class="text-blue-400 font-medium"></span></span>
      <span>RSI: <span id="info-rsi" class="font-medium"></span></span>
    </div>
  </div>
</div>

<!-- 資産推移 -->
<div class="card p-5 mb-4">
  <h2 class="font-bold text-white mb-3">💹 資産推移グラフ（円換算・累計）</h2>
  <div class="h-36">
    <canvas id="asset-chart"></canvas>
  </div>
</div>

<!-- 取引履歴 -->
<div class="card p-5">
  <h2 class="font-bold text-white mb-3">📋 取引履歴</h2>
  <div id="trades-table" class="overflow-auto max-h-72">
    <div class="text-slate-500 text-sm text-center py-8">取引履歴なし</div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 px-5 py-3 rounded-xl text-sm font-medium shadow-2xl hidden z-50"></div>

<script>
// ==================== ユーティリティ ====================
const fmtJpy  = n => n == null ? '--' : Math.round(n).toLocaleString('ja-JP') + '円';
const fmtPct  = n => n == null ? '--' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
const fmtNum  = n => n == null ? '--' : n.toLocaleString('ja-JP');

let priceChart = null, assetChart = null, selectedTicker = null;
let refreshTimer = 60;

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `fixed bottom-6 right-6 px-5 py-3 rounded-xl text-sm font-medium shadow-2xl z-50 ${
    type==='success' ? 'bg-emerald-600 text-white' :
    type==='error'   ? 'bg-red-600 text-white' : 'bg-indigo-600 text-white'
  }`;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 4000);
}

// ==================== 市場ステータス ====================
async function loadMarkets() {
  try {
    const d = await fetch('/api/markets').then(r => r.json());
    const el = document.getElementById('market-cards');
    el.innerHTML = Object.entries(d).map(([key, m]) => `
      <div class="card p-4 ${m.is_open ? 'mkt-open' : 'mkt-closed'} rounded-xl">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xl">${m.flag}</span>
          <span class="text-xs px-2 py-0.5 rounded-full ${m.is_open
            ? 'bg-green-900 text-green-300 border border-green-700'
            : 'bg-slate-800 text-slate-500 border border-slate-700'}">
            ${m.is_open ? '● 開場中' : '○ 閉場'}
          </span>
        </div>
        <div class="font-bold text-sm ${m.is_open ? 'text-white' : 'text-slate-400'}">${m.name}</div>
        <div class="text-lg font-mono font-bold mt-1 ${m.is_open ? 'text-green-300' : 'text-slate-500'}">${m.local_time}</div>
        <div class="text-xs text-slate-500 mt-1">${m.open_time}〜${m.close_time}</div>
      </div>
    `).join('');
  } catch(e) { console.error(e); }
}

// ==================== サマリー ====================
async function loadStatus() {
  try {
    const d = await fetch('/api/status').then(r => r.json());
    document.getElementById('total-assets').textContent = fmtJpy(d.total_assets);
    document.getElementById('cash').textContent = fmtJpy(d.cash);
    const cr = d.total_assets > 0 ? (d.cash / d.total_assets * 100).toFixed(1) : 0;
    document.getElementById('cash-ratio').textContent = `総資産の ${cr}%`;

    const pnlEl = document.getElementById('pnl');
    pnlEl.textContent = fmtJpy(d.pnl);
    pnlEl.className = `text-2xl font-bold ${d.pnl >= 0 ? 'positive' : 'negative'}`;

    const pctEl = document.getElementById('pnl-pct');
    pctEl.textContent = fmtPct(d.pnl_pct);
    pctEl.className = `text-2xl font-bold ${d.pnl_pct >= 0 ? 'positive' : 'negative'}`;
  } catch(e) { console.error(e); }
}

// ==================== ポートフォリオ ====================
async function loadPortfolio() {
  try {
    const d = await fetch('/api/portfolio').then(r => r.json());
    document.getElementById('stock-value').textContent =
      `株式評価額: ${fmtJpy(d.total_stock_value_jpy)}`;

    const el = document.getElementById('portfolio-table');
    if (!d.holdings?.length) {
      el.innerHTML = '<div class="text-slate-500 text-sm text-center py-10">現在保有株なし</div>';
      return;
    }
    el.innerHTML = `
      <table class="w-full text-sm">
        <thead><tr class="text-slate-400 text-xs border-b border-slate-700">
          <th class="pb-2 text-left">銘柄</th>
          <th class="pb-2 text-right">株数</th>
          <th class="pb-2 text-right">現在値</th>
          <th class="pb-2 text-right">評価額(円)</th>
          <th class="pb-2 text-right">含み損益</th>
        </tr></thead>
        <tbody>
          ${d.holdings.map(h => `
            <tr class="border-b border-slate-800 hover:bg-slate-800/40">
              <td class="py-2.5">
                <div class="flex items-center gap-1.5">
                  <span class="text-base">${h.flag}</span>
                  <div>
                    <div class="font-medium text-white text-xs">${h.name}</div>
                    <div class="text-slate-500 text-xs">${h.ticker} · ${h.currency}</div>
                  </div>
                </div>
              </td>
              <td class="py-2.5 text-right text-slate-300 text-xs">${h.shares}</td>
              <td class="py-2.5 text-right text-slate-300 text-xs">
                ${h.current_price_local.toFixed(2)}<span class="text-slate-500"> ${h.currency}</span>
              </td>
              <td class="py-2.5 text-right text-white font-medium text-xs">${fmtJpy(h.market_value_jpy)}</td>
              <td class="py-2.5 text-right text-xs font-medium ${h.unrealized_pct >= 0 ? 'positive' : 'negative'}">
                ${h.unrealized_pct >= 0 ? '+' : ''}${fmtJpy(h.unrealized_pnl_jpy)}<br>
                <span class="text-xs">(${fmtPct(h.unrealized_pct)})</span>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  } catch(e) { console.error(e); }
}

// ==================== 取引履歴 ====================
async function loadTrades() {
  try {
    const d = await fetch('/api/trades?limit=30').then(r => r.json());
    const el = document.getElementById('trades-table');
    if (!d.trades?.length) {
      el.innerHTML = '<div class="text-slate-500 text-sm text-center py-8">取引履歴なし</div>';
      return;
    }
    el.innerHTML = `
      <table class="w-full text-xs">
        <thead><tr class="text-slate-400 text-xs border-b border-slate-700">
          <th class="pb-2 text-left">日時(JST)</th>
          <th class="pb-2 text-left">銘柄</th>
          <th class="pb-2 text-center">売買</th>
          <th class="pb-2 text-right">株数</th>
          <th class="pb-2 text-right">現地価格</th>
          <th class="pb-2 text-right">円換算</th>
          <th class="pb-2 text-right">為替</th>
          <th class="pb-2 text-left">判断理由</th>
        </tr></thead>
        <tbody>
          ${d.trades.map(t => `
            <tr class="border-b border-slate-800 hover:bg-slate-800/40">
              <td class="py-2 text-slate-500 whitespace-nowrap">${t.executed_at?.slice(0,16).replace('T',' ') || '--'}</td>
              <td class="py-2">
                <span class="mr-1">${t.flag}</span>
                <span class="text-white font-medium">${t.name}</span>
                <span class="text-slate-500 ml-1">${t.ticker}</span>
              </td>
              <td class="py-2 text-center">
                <span class="badge-${t.action} text-xs px-2 py-0.5 rounded-full">
                  ${t.action === 'buy' ? '買い' : '売り'}
                </span>
              </td>
              <td class="py-2 text-right text-slate-300">${t.shares}</td>
              <td class="py-2 text-right text-slate-300">${Number(t.price_local).toFixed(2)} ${t.currency}</td>
              <td class="py-2 text-right text-white font-medium">${fmtJpy(t.total_jpy)}</td>
              <td class="py-2 text-right text-slate-500">${Number(t.fx_rate).toFixed(1)}</td>
              <td class="py-2 text-slate-400 max-w-xs truncate" title="${t.reason||''}">${t.reason||'—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  } catch(e) { console.error(e); }
}

// ==================== 株価チャート ====================
async function loadChart(ticker) {
  selectedTicker = ticker;
  document.querySelectorAll('.tab').forEach(b =>
    b.classList.toggle('active', b.dataset.ticker === ticker));
  document.getElementById('chart-loading').textContent = '📡 取得中...';
  document.getElementById('chart-loading').classList.remove('hidden');

  try {
    const d = await fetch(`/api/chart/${ticker}`).then(r => r.json());
    document.getElementById('chart-loading').classList.add('hidden');
    document.getElementById('chart-info').classList.remove('hidden');

    document.getElementById('info-currency').textContent = `${d.flag} ${d.currency}`;
    document.getElementById('info-price').textContent =
      `${d.current_price.toFixed(4)} ${d.currency}`;
    document.getElementById('info-ma5').textContent =
      d.ma5 ? `${d.ma5.toFixed(2)}` : '--';
    const rsiEl = document.getElementById('info-rsi');
    rsiEl.textContent = d.rsi14 ? d.rsi14.toFixed(1) : '--';
    rsiEl.className = `font-medium ${d.rsi14 >= 70 ? 'text-red-400' :
                                      d.rsi14 <= 30 ? 'text-green-400' : 'text-yellow-400'}`;

    if (priceChart) priceChart.destroy();
    const ctx = document.getElementById('price-chart').getContext('2d');
    priceChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: d.price_history.map(h => h.date.slice(5)),
        datasets: [
          { label: '終値', data: d.price_history.map(h => h.close),
            borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,0.08)',
            fill:true, pointRadius:0, borderWidth:2, tension:0.3 },
          { label: 'MA5', data: d.price_history.map(h => h.ma5),
            borderColor:'#60a5fa', pointRadius:0, borderWidth:1.5, tension:0.3 },
          { label: 'MA25', data: d.price_history.map(h => h.ma25),
            borderColor:'#fbbf24', pointRadius:0, borderWidth:1.5, tension:0.3 },
        ],
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: {
          legend: { labels:{ color:'#94a3b8', font:{size:11}, usePointStyle:true } },
          tooltip: {
            backgroundColor:'#0f1e35', borderColor:'#1e3a5f', borderWidth:1,
            titleColor:'#e2e8f0', bodyColor:'#94a3b8',
          }
        },
        scales: {
          x: { ticks:{color:'#64748b', maxTicksLimit:8}, grid:{color:'#0f1e35'} },
          y: { ticks:{color:'#64748b'}, grid:{color:'#1e3a5f'} },
        },
      },
    });
  } catch(e) {
    document.getElementById('chart-loading').textContent = '⚠️ データ取得失敗';
  }
}

// ==================== 資産推移 ====================
async function loadAssetChart() {
  try {
    const d = await fetch('/api/asset-history?days=30').then(r => r.json());
    const h = d.history || [];
    if (assetChart) assetChart.destroy();
    const ctx = document.getElementById('asset-chart').getContext('2d');
    assetChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: h.map(x => x.date?.slice(5) || ''),
        datasets: [
          { label: '総資産', data: h.map(x => x.total_assets),
            borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,0.1)',
            fill:true, pointRadius:2, borderWidth:2, tension:0.4 },
          { label: '初期資金', data: h.map(() => 2000000),
            borderColor:'#ef4444', borderDash:[6,3], pointRadius:0, borderWidth:1.5 },
        ],
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: {
          legend:{ labels:{color:'#94a3b8', font:{size:11}, usePointStyle:true} },
          tooltip:{
            backgroundColor:'#0f1e35', borderColor:'#1e3a5f', borderWidth:1,
            titleColor:'#e2e8f0', bodyColor:'#94a3b8',
            callbacks:{ label: ctx => `${ctx.dataset.label}: ${fmtJpy(ctx.parsed.y)}` }
          }
        },
        scales: {
          x:{ ticks:{color:'#64748b', maxTicksLimit:8}, grid:{display:false} },
          y:{ ticks:{color:'#64748b', callback: v => fmtJpy(v)}, grid:{color:'#1e3a5f'} },
        },
      },
    });
  } catch(e) { console.error(e); }
}

// ==================== ウォッチリストタブ ====================
async function loadWatchlistTabs() {
  try {
    const d = await fetch('/api/watchlist').then(r => r.json());
    const container = document.getElementById('ticker-tabs');
    container.innerHTML = '';
    let first = true;
    d.watchlist.forEach(w => {
      const btn = document.createElement('button');
      btn.className = 'tab';
      btn.dataset.ticker = w.ticker;
      btn.innerHTML = `${w.flag} ${w.name.slice(0,6)}`;
      btn.title = `${w.name} (${w.ticker}) - ${w.currency}`;
      btn.onclick = () => loadChart(w.ticker);
      container.appendChild(btn);
      if (first) { loadChart(w.ticker); first = false; }
    });
  } catch(e) { console.error(e); }
}

// ==================== 手動取引 ====================
async function runTrade() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 全市場を分析中...';
  try {
    const d = await fetch('/api/trade/run', {method:'POST'}).then(r => r.json());
    if (d.status === 'success') {
      showToast(`✅ 取引完了！${d.executed_trades?.length||0}件実行`, 'success');
    } else {
      showToast(`⚠️ ${d.message || 'エラー'}`, 'error');
    }
    await loadAll();
  } catch(e) {
    showToast('❌ サーバーエラー', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '⚡ 今すぐ取引';
  }
}

async function resetData() {
  if (!confirm('全データをリセットして200万円からやり直しますか？')) return;
  await fetch('/api/reset', {method:'POST'});
  showToast('🔄 リセット完了！', 'info');
  await loadAll();
}

// ==================== 全データ更新 ====================
async function loadAll() {
  await Promise.all([
    loadMarkets(),
    loadStatus(),
    loadPortfolio(),
    loadTrades(),
    loadAssetChart(),
  ]);
  if (selectedTicker) loadChart(selectedTicker);
}

// ==================== カウントダウン ====================
setInterval(async () => {
  refreshTimer--;
  document.getElementById('countdown-badge').textContent = `更新: ${refreshTimer}秒`;
  if (refreshTimer <= 0) {
    await loadAll();
    refreshTimer = 60;
  }
}, 1000);

// ==================== 初期化 ====================
(async () => {
  await loadWatchlistTabs();
  await loadAll();
})();
</script>
</body>
</html>
